name: Windows Beta Release

on:
  push:
    branches:
      - release/beta
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install

      - name: Build (Windows x64)
        run: pnpm tauri build --bundles nsis

      - name: Get version and artifacts
        id: info
        shell: bash
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          EXE=$(ls src-tauri/target/release/bundle/nsis/*.exe | grep -v '\.sig$' | head -1)
          SIG=$(ls src-tauri/target/release/bundle/nsis/*.exe.sig | head -1)
          echo "exe=$EXE" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"
          echo "exe_name=$(basename $EXE)" >> "$GITHUB_OUTPUT"

      - name: Download existing beta.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release download beta --pattern "beta.json" --dir . --clobber 2>/dev/null || echo '{}' > beta.json

      - name: Update beta.json with Windows platform
        shell: bash
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          WIN_SIG=$(cat "${{ steps.info.outputs.sig }}")
          WIN_EXE="${{ steps.info.outputs.exe_name }}"

          # If beta.json has existing macOS entry, preserve it; otherwise create new
          if jq -e '.platforms["darwin-aarch64"]' beta.json >/dev/null 2>&1; then
            # Add/update Windows platform to existing JSON
            jq --arg sig "$WIN_SIG" \
               --arg url "https://github.com/momocham922/markflow/releases/download/beta/$WIN_EXE" \
               '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}' \
               beta.json > beta_updated.json
            mv beta_updated.json beta.json
          else
            # No existing release — create Windows-only JSON (macOS will be added by local script)
            jq -n --arg ver "$VERSION" \
                  --arg sig "$WIN_SIG" \
                  --arg url "https://github.com/momocham922/markflow/releases/download/beta/$WIN_EXE" \
              '{version: $ver, notes: ("Beta release v" + $ver), pub_date: (now | strftime("%Y-%m-%dT%H:%M:%SZ")), platforms: {"windows-x86_64": {signature: $sig, url: $url}}}' \
              > beta.json
          fi
          cat beta.json

      - name: Upload to beta release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Delete old Windows assets if they exist
          gh release delete-asset beta "${{ steps.info.outputs.exe_name }}" --yes 2>/dev/null || true
          gh release delete-asset beta "${{ steps.info.outputs.exe_name }}.sig" --yes 2>/dev/null || true
          gh release delete-asset beta "beta.json" --yes 2>/dev/null || true

          # Upload new assets (create release if it doesn't exist)
          if gh release view beta >/dev/null 2>&1; then
            gh release upload beta \
              "${{ steps.info.outputs.exe }}" \
              "${{ steps.info.outputs.sig }}" \
              beta.json \
              --clobber
          else
            VERSION="${{ steps.info.outputs.version }}"
            gh release create beta \
              "${{ steps.info.outputs.exe }}" \
              "${{ steps.info.outputs.sig }}" \
              beta.json \
              --title "Beta v${VERSION}" \
              --notes "Beta release v${VERSION}" \
              --prerelease
          fi
