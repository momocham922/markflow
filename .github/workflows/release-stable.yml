name: Windows Stable Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install

      - name: Build (Windows x64)
        run: pnpm tauri build --bundles nsis

      - name: Get version and artifacts
        id: info
        shell: bash
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

          EXE=$(ls src-tauri/target/release/bundle/nsis/*.exe | grep -v '\.sig$' | head -1)
          SIG=$(ls src-tauri/target/release/bundle/nsis/*.exe.sig | head -1)
          echo "exe=$EXE" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"
          echo "exe_name=$(basename $EXE)" >> "$GITHUB_OUTPUT"

      - name: Download existing latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.info.outputs.tag }}"
          gh release download "$TAG" --pattern "latest.json" --dir . --clobber 2>/dev/null || echo '{}' > latest.json

      - name: Update latest.json with Windows platform
        shell: bash
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          TAG="${{ steps.info.outputs.tag }}"
          WIN_SIG=$(cat "${{ steps.info.outputs.sig }}")
          WIN_EXE="${{ steps.info.outputs.exe_name }}"

          if jq -e '.platforms["darwin-aarch64"]' latest.json >/dev/null 2>&1; then
            jq --arg sig "$WIN_SIG" \
               --arg url "https://github.com/momocham922/markflow/releases/download/$TAG/$WIN_EXE" \
               '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}' \
               latest.json > latest_updated.json
            mv latest_updated.json latest.json
          else
            jq -n --arg ver "$VERSION" \
                  --arg sig "$WIN_SIG" \
                  --arg url "https://github.com/momocham922/markflow/releases/download/$TAG/$WIN_EXE" \
              '{version: $ver, notes: ("MarkFlow v" + $ver), pub_date: (now | strftime("%Y-%m-%dT%H:%M:%SZ")), platforms: {"windows-x86_64": {signature: $sig, url: $url}}}' \
              > latest.json
          fi
          cat latest.json

      - name: Upload to stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.info.outputs.tag }}"

          gh release delete-asset "$TAG" "${{ steps.info.outputs.exe_name }}" --yes 2>/dev/null || true
          gh release delete-asset "$TAG" "${{ steps.info.outputs.exe_name }}.sig" --yes 2>/dev/null || true
          gh release delete-asset "$TAG" "latest.json" --yes 2>/dev/null || true

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "${{ steps.info.outputs.exe }}" \
              "${{ steps.info.outputs.sig }}" \
              latest.json \
              --clobber
          else
            VERSION="${{ steps.info.outputs.version }}"
            gh release create "$TAG" \
              "${{ steps.info.outputs.exe }}" \
              "${{ steps.info.outputs.sig }}" \
              latest.json \
              --title "MarkFlow v${VERSION}" \
              --generate-notes
          fi
