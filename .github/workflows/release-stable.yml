name: Stable Release (macOS + Windows)

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install

      - name: Build (macOS aarch64)
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install

      - name: Build (Windows x64)
        run: pnpm tauri build --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos

      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAC_SIG=$(cat artifacts/macos/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig)
          WIN_SIG=$(cat artifacts/windows/src-tauri/target/release/bundle/nsis/*.exe.sig)
          WIN_EXE=$(basename artifacts/windows/src-tauri/target/release/bundle/nsis/*.exe | grep -v '\.sig$')

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "MarkFlow v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/momocham922/markflow/releases/latest/download/MarkFlow.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/momocham922/markflow/releases/latest/download/${WIN_EXE}"
              }
            }
          }
          EOF
          cat latest.json

      - name: Collect release files
        run: |
          mkdir -p release-files
          cp artifacts/macos/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg release-files/
          cp artifacts/macos/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz release-files/
          cp artifacts/macos/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig release-files/
          cp artifacts/windows/src-tauri/target/release/bundle/nsis/*.exe release-files/
          cp artifacts/windows/src-tauri/target/release/bundle/nsis/*.exe.sig release-files/
          cp latest.json release-files/
          ls -la release-files/

      - name: Create stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            release-files/* \
            --title "MarkFlow v${VERSION}" \
            --generate-notes
